<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>leolompi · scripts & herramientas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/palette.css" />
    <style>

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        margin: 0;
        font-family: 'IBM Plex Mono', monospace;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: rgb(var(--neo-text));
        background-color: rgb(var(--neo-bg));
      }

      .loguito {
        font-family: Console, Courier, monospace;
        font-size: 1.5rem;
        color: rgb(var(--neo-blue));
      }

      .loguito .cursor {
        display: inline-block;
        width: 0.1rem;
        height: 1.4rem;
        margin-left: 0.2rem;
        background-color: rgb(var(--neo-blue));
        animation: blink 1s steps(2, start) infinite;
        line-height: 1.5rem;
        vertical-align: middle;
      }

      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      .navbar .form-control {
        border-radius: 0;
      }

      footer {
        position: static;
        margin-top: auto;
        width: 100%;
      }

      footer span {
        color: rgb(var(--neo-pink));
        background-color: rgb(var(--neo-surface));
        font-family: Console, Courier, monospace;
        font-size: 1rem;
        padding: 0.2rem 0.6rem;
        border: 3px solid rgb(var(--neo-pink));
        box-shadow: 4px 4px 0 rgb(var(--neo-shadow));
        display: inline-block;
      }

    </style>
  </head>
  <body>
    <nav class="navbar bg-body-tertiary nav-neo">
      <div class="container-fluid">
        <a class="navbar-brand loguito">$~LeoLompi<span class="cursor"></span></a>
        <form class="d-flex" role="search">
          <input
            class="form-control me-2"
            type="search"
            id="searchInput"
            placeholder="Busca algo..."
            aria-label="Search"
          />
          <button class="btn-neo green" type="submit">Search</button>
        </form>
      </div>
    </nav>

    <main id="main">
      <h1 class="display-4 p-3">Herramientas</h1>
      <section id="herramientas" class="mb-5 d-flex flex-wrap gap-2 p-3">
      </section>

      <h1 class="display-4 p-3">Retos</h1>
      <section id="retos" class="mb-5 d-flex flex-wrap gap-2 p-3">
      </section>
    </main>

    <section id="spaceScript">

    </section>
    
    <footer class="surface-neo text-white py-3">
      <div
      class="container d-flex flex-column flex-md-row justify-content-between align-items-center"
      >
      <span>© 2026 LeoLompi</span>
    </div>
    </footer>

    <script src="scripts/biblioteca.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
