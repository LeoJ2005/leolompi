      font-size: 0.9rem;

    .nav-link-neo.active {

    .page-header {

    .page-header h1 {

      text-transform: uppercase;

    .page-header .breadcrumb-neo {

    .page-header .breadcrumb-neo a {

      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: all 0.15s ease;
    }

    .page-header .breadcrumb-neo a:hover {
      color: var(--accent-orange);
      border-bottom-color: var(--accent-orange);
    }

    .page-header .breadcrumb-neo .sep {
      margin: 0 0.5rem;
    }

      position: relative;
      max-width: 500px;

      background: var(--bg-card);
      border: 3px solid var(--border-color);
      border-radius: 0;
      color: var(--text-primary);

      background: #1e1e1e;

    .hero-search-btn {
      background: var(--accent-orange);
      border: 3px solid var(--border-color);
      border-left: none;
      border-radius: 0;
      color: #fff;
      font-weight: 700;
      padding: 0 1.5rem;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      transition: all 0.1s ease;
      white-space: nowrap;
    }

    .hero-search-btn:hover {
      background: #e55a28;
      transform: translate(-2px, -2px);
    }

    .reto-card {
      background: var(--bg-card);
      border: 3px solid var(--border-color);
      border-radius: 0;
      padding: 1.25rem 1.5rem;
      transition: all 0.2s ease;
      box-shadow: 6px 6px 0px 0px rgba(255,255,255,0.06);
      display: flex;
      align-items: flex-start;
      gap: 1rem;

    .reto-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0px 0px var(--accent-orange);
    }

    .reto-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--accent-orange);
      min-width: 2.5rem;
      line-height: 1.4;

    .reto-body { flex: 1; min-width: 0; }
    .reto-actions { display: flex; align-items: center; margin-left: auto; flex-shrink: 0; }

    .reto-body h4 {
      font-weight: 800;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 0.25rem;
    }

    .reto-body p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

      display: inline-block;
      border: 2px solid;
      padding: 0.15rem 0.6rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;

    .badge-neo.medium { border-color: #ffd600; color: #ffd600; }
    .badge-neo.hard { border-color: #ff2e63; color: #ff2e63; }
    .badge-neo.year { border-color: #555; color: #888; }

    #search-state {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
      min-height: 1.5rem;
    }

    .reto-doc-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent-orange);
      text-decoration: none;
      border: 2px solid var(--accent-orange);
      padding: 0.2rem 0.6rem;
      transition: all 0.15s ease;

    .reto-doc-link:hover {
      background: var(--accent-orange);
      color: #000;
    }

    .reto-hidden { display: none !important; }

    .neo-footer {
      background: var(--bg-secondary);
      border-top: 3px solid var(--border-color);
      padding: 1.5rem 0;
      margin-top: auto;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .neo-footer .brand {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--text-primary);
    }

    .neo-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: all 0.15s ease;
    }

    .neo-footer a:hover {
      color: var(--accent-orange);
      border-bottom-color: var(--accent-orange);
    }

      .page-header h1 { font-size: 1.75rem; }
      .hero-search-wrap { flex-direction: column; }
      .hero-search-btn {
        border-left: 3px solid var(--border-color);
        border-top: none;
        padding: 0.5rem;
        width: 100%;
      }
      .logo-svg { height: 32px; }
    }

      const container = document.getElementById('retosContainer');
      const searchInput = document.getElementById('searchInput');
      const searchBtn = document.getElementById('searchBtn');
      const stateEl = document.getElementById('search-state');

      function render (filter = '') {
        const q = filter.toLowerCase().trim();
        let html = '';
        let visible = 0;

        retos.forEach(r => {
          const match = !q || r.title.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q) || `#${r.n}` === q;
          if (!match) return;
          visible++;

          const diffLabel = { easy: 'Fácil', medium: 'Medio', hard: 'Difícil' }[r.difficulty] || r.difficulty;

          const docLink = r.doc
            ? `<a href="${r.doc}" class="reto-doc-link" target="_blank"><i class="bi bi-file-earmark-code"></i> ${r.doc.split('/').pop()}</a>`
            : '';

          html += `
            <div class="col-12">
              <div class="reto-card">
                <div class="reto-number">#${String(r.n).padStart(3, '0')}</div>
                <div class="reto-body">
                  <h4>${r.title}</h4>
                  <p>${r.desc}</p>
                  <div class="reto-meta">
                    <span class="badge-neo ${r.difficulty}">${diffLabel}</span>
                    <span class="badge-neo year">#${r.year}</span>
                  </div>
                </div>
                ${docLink ? `<div class="reto-actions">${docLink}</div>` : ''}
              </div>
            </div>
          `;
        });

        container.innerHTML = html || '<div class="col-12"><div class="reto-card"><div class="reto-body"><p class="mb-0" style="color:var(--text-secondary);">⛔ No hay retos que coincidan con tu búsqueda.</p></div></div></div>';

        stateEl.textContent = q
          ? `📁 ${visible} reto(s) encontrado(s) de ${retos.length}`
          : `📦 ${retos.length} retos de programación`;
      }

      searchInput.addEventListener('input', () => render(searchInput.value));
      searchBtn.addEventListener('click', () => render(searchInput.value));
      searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); render(searchInput.value); } });

      render();
    })();
  </script>
